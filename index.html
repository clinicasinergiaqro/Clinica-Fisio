<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clínica Sinergia — Sistema Clínico</title>
<style>
:root {
  --navy:#1B3A6B; --navy-dark:#122950; --navy-light:#2A4F8F;
  --gold:#C9A84C; --gold-light:#E8C96A;
  --white:#FFFFFF; --gray-50:#F7F8FA; --gray-100:#EEF0F4;
  --gray-200:#DDE1EA; --gray-400:#9BA3B5; --gray-600:#5A6478; --gray-800:#2D3344;
  --green:#2E7D52; --green-light:#E8F5EE;
  --red:#C0392B; --red-light:#FDECEA;
  --amber:#B7791F; --amber-light:#FEF3C7;
  --blue-light:#EBF3FF;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(27,58,107,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Arial,sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:15px}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#screen-login{background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 55%,var(--navy-light) 100%);align-items:center;justify-content:center;padding:32px 24px}
.login-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;backdrop-filter:blur(12px)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .mark{width:64px;height:64px;background:var(--gold);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px}
.login-logo h1{color:var(--white);font-size:22px;font-weight:700}
.login-logo p{color:rgba(255,255,255,.55);font-size:13px;margin-top:4px}
.login-box label{display:block;color:rgba(255,255,255,.7);font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.login-box input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:var(--radius-sm);color:var(--white);font-size:15px;padding:13px 16px;margin-bottom:20px;outline:none;transition:border-color .2s}
.login-box input::placeholder{color:rgba(255,255,255,.35)}
.login-box input:focus{border-color:var(--gold)}
.btn-login{width:100%;background:var(--gold);color:var(--navy-dark);font-size:15px;font-weight:700;border:none;border-radius:var(--radius-sm);padding:14px;cursor:pointer;margin-top:4px}
.btn-login:active{transform:scale(.98)}
.login-error{background:var(--red-light);color:var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}

/* TOPBAR */
.topbar{background:var(--navy);color:var(--white);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(27,58,107,.25)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.topbar-avatar{width:34px;height:34px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--navy-dark);cursor:pointer;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;line-height:1}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px}

/* DATE HEADER */
.date-header{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--gold);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.date-header .date-text{font-size:15px;font-weight:700;color:var(--navy)}
.date-header .date-sub{font-size:12px;color:var(--gray-400);margin-top:2px}
.session-count{background:var(--navy);color:var(--white);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}

/* PATIENT CARD */
.patient-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;border:1.5px solid transparent;display:flex;align-items:center;gap:14px}
.patient-card:active{transform:scale(.98);border-color:var(--navy)}
.patient-avatar{width:44px;height:44px;border-radius:12px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--navy);flex-shrink:0}
.patient-info{flex:1;min-width:0}
.patient-name{font-weight:700;font-size:15px;color:var(--gray-800)}
.patient-meta{font-size:12px;color:var(--gray-400);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.badge-pending{background:var(--amber-light);color:var(--amber)}
.badge-done{background:var(--green-light);color:var(--green)}
.badge-alert{background:var(--red-light);color:var(--red)}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;background:var(--gold);border-radius:50%;border:none;color:var(--navy-dark);font-size:26px;box-shadow:0 4px 16px rgba(201,168,76,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.93)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-200);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;color:var(--gray-400);font-size:10px;font-weight:600;gap:3px;border:none;background:none}
.nav-item.active{color:var(--navy)}
.nav-item svg{width:22px;height:22px}

/* EXP HEADER */
.exp-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);color:var(--white);padding:20px 16px 24px;margin:-16px -16px 16px}
.exp-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.exp-meta{font-size:13px;color:rgba(255,255,255,.65);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.exp-pills{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.exp-pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.exp-pill.gold{background:var(--gold);color:var(--navy-dark)}
.exp-pill.red{background:rgba(192,57,43,.35);color:#FACACA}

/* TABS */
.tabs{display:flex;background:var(--white);border-radius:var(--radius);padding:4px;margin-bottom:16px;box-shadow:var(--shadow);gap:2px;overflow-x:auto}
.tab{flex:0 0 auto;padding:9px 12px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-400);border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--navy);color:var(--white)}

/* SECTION CARD */
.section-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.section-title{background:var(--gray-50);border-bottom:1px solid var(--gray-100);padding:10px 14px;font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;gap:6px}
.field-row{padding:11px 14px;border-bottom:1px solid var(--gray-100);display:flex;gap:10px}
.field-row:last-child{border-bottom:none}
.field-label{font-size:12px;color:var(--gray-400);font-weight:600;min-width:120px;flex-shrink:0;padding-top:1px}
.field-value{font-size:14px;color:var(--gray-800);flex:1;line-height:1.5}
.field-value.narrative{font-size:13px;line-height:1.6;color:var(--gray-600)}

/* EVA */
.eva-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
.eva-low{background:#E8F5EE;color:#2E7D52}
.eva-mid{background:#FEF3C7;color:#B7791F}
.eva-high{background:#FDECEA;color:#C0392B}

/* SOAP CARDS */
.soap-card{background:var(--white);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.soap-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100);cursor:pointer}
.soap-sesion{font-weight:800;font-size:14px;color:var(--navy)}
.soap-meta{font-size:11px;color:var(--gray-400);margin-top:2px}
.soap-body{padding:12px 14px}
.soap-section{margin-bottom:10px}
.soap-section:last-child{margin-bottom:0}
.soap-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.soap-s{color:#1565C0;background:#E3F2FD;padding:2px 8px;border-radius:4px}
.soap-o{color:#1B5E20;background:#E8F5E9;padding:2px 8px;border-radius:4px}
.soap-a{color:#E65100;background:#FFF3E0;padding:2px 8px;border-radius:4px}
.soap-p{color:#4A148C;background:#F3E5F5;padding:2px 8px;border-radius:4px}
.soap-sub{font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:3px;margin-top:6px}
.soap-text{font-size:13px;color:var(--gray-800);line-height:1.5}

/* FORM */
.form-section{margin-bottom:16px}
.form-section-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding:0 2px;display:flex;align-items:center;gap:6px}
.form-group{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.form-field{padding:13px 14px;border-bottom:1px solid var(--gray-100)}
.form-field:last-child{border-bottom:none}
.form-label{font-size:12px;font-weight:600;color:var(--gray-400);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.form-label .req{color:var(--red)}
.form-input{width:100%;border:none;outline:none;font-size:15px;color:var(--gray-800);background:transparent;font-family:inherit;resize:none}
.form-input::placeholder{color:var(--gray-200)}
textarea.form-input{min-height:64px;line-height:1.5}
select.form-input{font-size:14px}

/* EVA SLIDER */
.eva-slider-wrap{display:flex;align-items:center;gap:12px}
.eva-slider{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#2E7D52,#F59E0B,#C0392B);outline:none}
.eva-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--navy);border:3px solid var(--white);box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
.eva-val{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--gray-100);color:var(--navy);flex-shrink:0}

/* CHECKBOXES */
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--gray-50);border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.checkbox-item.checked{background:var(--navy);border-color:var(--navy)}
.checkbox-item.checked .cb-label{color:var(--white)}
.cb-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;background:var(--white)}
.checkbox-item.checked .cb-box{background:var(--gold);border-color:var(--gold);color:var(--navy-dark)}
.cb-label{font-size:12px;font-weight:600;color:var(--gray-600)}

/* BUTTONS */
.btn-primary{width:100%;background:var(--navy);color:var(--white);border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{width:100%;background:var(--white);color:var(--navy);border:2px solid var(--navy);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-gold{width:100%;background:var(--gold);color:var(--navy-dark);border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}

/* ALERTS */
.alert-banner{background:var(--amber-light);border:1px solid #F6C84B;border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.alert-banner-icon{font-size:18px;flex-shrink:0}
.alert-banner-text{font-size:13px;color:var(--amber);font-weight:600;line-height:1.4}
.contraindication-box{background:var(--red-light);border:1px solid #FACACA;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--red);font-weight:600;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.allergy-box{background:#FFF0F6;border:1px solid #FFC0D4;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:#AD1457;font-weight:600;display:flex;gap:8px;margin-bottom:8px}

/* SEARCH */
.search-wrap{background:var(--white);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);margin-bottom:14px;border:1.5px solid transparent}
.search-wrap:focus-within{border-color:var(--navy)}
.search-input{border:none;outline:none;font-size:15px;color:var(--gray-800);background:transparent;flex:1;font-family:inherit}
.search-input::placeholder{color:var(--gray-400)}

/* MEDIA */
.media-btn-row{display:flex;gap:8px;margin-bottom:10px}
.media-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--white);border:2px dashed var(--gray-200);border-radius:var(--radius);padding:14px 8px;cursor:pointer;font-size:11px;font-weight:700;color:var(--gray-400);font-family:inherit}
.media-btn:active{border-color:var(--navy);color:var(--navy)}
.media-btn .media-icon{font-size:24px}
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.media-thumb{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--gray-100);border:1px solid var(--gray-200)}
.media-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.media-del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(192,57,43,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;cursor:pointer;border:none;line-height:1}
.media-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:white;font-size:9px;font-weight:600;padding:3px 5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gray-100);cursor:pointer}
.doc-item:last-child{border-bottom:none}
.doc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-icon.img{background:#E8F0FE}
.doc-icon.pdf{background:var(--red-light)}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11px;color:var(--gray-400);margin-top:2px}

/* CONSENT CANVAS */
.consent-wrap{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.consent-text{font-size:13px;color:var(--gray-600);line-height:1.7;margin-bottom:16px}
.consent-canvas-wrap{border:2px dashed var(--gray-200);border-radius:var(--radius-sm);background:var(--gray-50);position:relative;margin-bottom:8px}
.consent-canvas-wrap canvas{display:block;touch-action:none;border-radius:var(--radius-sm)}
.canvas-label{font-size:11px;color:var(--gray-400);text-align:center;padding:6px;font-weight:600}
.btn-clear-sig{background:none;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;color:var(--gray-400);cursor:pointer;font-family:inherit}
.sig-saved{background:var(--green-light);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--green);font-weight:600;text-align:center;display:none}

/* SUPERVISION */
.sup-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--gray-100)}
.sup-row:last-child{border-bottom:none}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-800);color:var(--white);padding:12px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

.empty-state{text-align:center;padding:48px 24px;color:var(--gray-400)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.5}

.nuevopaciente-form{padding-bottom:100px}

/* ── EJERCICIOS ── */
.ejercicio-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;border-left:4px solid var(--green)}
.ejercicio-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100)}
.ejercicio-nombre{font-weight:800;font-size:15px;color:var(--navy)}
.ejercicio-meta{font-size:11px;color:var(--gray-400);margin-top:3px}
.ejercicio-body{padding:12px 14px}
.ejercicio-media{width:100%;border-radius:var(--radius-sm);margin-bottom:10px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:160px;position:relative;cursor:pointer}
.ejercicio-media img,.ejercicio-media video{width:100%;border-radius:var(--radius-sm);display:block;max-height:240px;object-fit:cover}
.play-overlay{position:absolute;width:52px;height:52px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;pointer-events:none}
.dosis-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.dosis-chip{background:var(--gray-50);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
.dosis-chip .dval{font-size:14px;font-weight:800;color:var(--navy)}
.dosis-chip .dlbl{font-size:9px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.link-box{background:#EBF3FF;border:1px solid #BDD7F5;border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px}
.link-url{font-size:11px;color:var(--navy);font-weight:600;word-break:break-all;margin-bottom:8px}
.link-btns{display:flex;gap:8px}
.btn-copy{background:var(--navy);color:var(--white);border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex:1}
.btn-wa{background:#25D366;color:var(--white);border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex:1}
.ejercicio-actions{display:flex;gap:6px;margin-top:10px}
.btn-edit-ex{flex:1;background:var(--gray-50);color:var(--navy);border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-del-ex{background:var(--red-light);color:var(--red);border:1px solid #FACACA;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-toggle-link{background:var(--amber-light);color:var(--amber);border:1px solid #F6C84B;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
/* Vista pública */
#screen-pub-ejercicios{background:#F0F4FF}
.pub-header{background:linear-gradient(135deg,#1B3A6B,#2A4F8F);color:#fff;padding:24px 20px 28px;text-align:center}
.pub-card{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 12px rgba(27,58,107,.1)}
.pub-card-hdr{background:#1B3A6B;color:#fff;padding:12px 14px}
.pub-card-num{font-size:10px;color:rgba(255,255,255,.6);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pub-card-nombre{font-size:16px;font-weight:800;margin-top:2px}
.pub-dosis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.pub-dosis-item{background:#EBF3FF;border-radius:8px;padding:8px;text-align:center}
.pub-dosis-val{font-size:15px;font-weight:800;color:#1B3A6B}

// saveDB — guarda de uno en uno para evitar URLs largas
async function saveDB(k,v){
  saveLocal(k,v);
  if(k!=='pts'||!APPS_SCRIPT_URL) return {ok:false,error:'Sin URL configurada'};
  let guardados=0;
  let errores=0;
  // Guardar cada paciente individualmente — URLs cortas que siempre funcionan
  for(const p of v){
    const datos = encodeURIComponent(JSON.stringify([p]));
    const url = `${APPS_SCRIPT_URL}?action=savePacientes&token=${TOKEN}&datos=${datos}`;
    let ok=false;
    for(let intento=1;intento<=2;intento++){
      try{
        const r = await fetch(url,{method:'GET'});
        const d = await r.json();
        if(d.ok){ok=true;break;}
      }catch(e){
        if(intento===2) console.warn(`Error guardando ${p.name}:`,e.message);
      }
      if(intento<2) await new Promise(r=>setTimeout(r,500));
    }
    if(ok) guardados++;
    else errores++;
  }
  if(errores===0){
    return {ok:true, guardados};
  } else {
    return {ok:false, error:`${errores} pacientes no se guardaron`, guardados};
  }
}

function loadDB(k){return loadLocal(k);}

async function loadFromCloud(){
  if(!APPS_SCRIPT_URL) return null;

    if(d.error){console.error('Cloud error:',d.error);return null;}
    if(Array.isArray(d)&&d.length>0){saveLocal('pts',d);return d;}
    return null;
  }catch(e){console.error('loadFromCloud error:',e);return null;}
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',2400);
}
function getEvaClass(n){return n<=3?'eva-low':n<=6?'eva-mid':'eva-high'}
function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function todayFmt(){return new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'})}

function showScreen(id,push=true){
  if(push&&screenStack[screenStack.length-1]!==id) screenStack.push(id);
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
  // show/hide fab-soap
  const fabSoap=document.getElementById('fab-soap');
  if(fabSoap) fabSoap.style.display=(id==='screen-expediente'&&currentPatient)?'flex':'none';
}
function goBack(){
  if(typeof consentStream!=='undefined'&&consentStream){ consentStream.getTracks().forEach(t=>t.stop()); consentStream=null; }
  screenStack.pop();
  const prev=screenStack[screenStack.length-1]||'screen-agenda';
  showScreen(prev,false);
}

function doLogin(){
  const u=document.getElementById('login-user').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  if(USERS[u]&&USERS[u].pass===p){
    currentUser={...USERS[u],username:u};
    err.style.display='none';
    document.getElementById('topbar-avatar').textContent=currentUser.initials;
    document.getElementById('topbar-role').textContent=
      currentUser.role==='supervisor'?'⭐ Supervisor':`Terapeuta · ${currentUser.name}`;
    if(currentUser.role==='supervisor'){
      document.getElementById('nav-supervision').style.display='flex';
      document.getElementById('nav-qa').style.display='flex';
    }
    screenStack=['screen-agenda'];
    showScreen('screen-agenda',false);
    // Cargar desde nube, fallback a local
    loadFromCloud().then(d=>{
      if(d&&d.length>0) patientsDB=d;
      renderAgenda();
    }).catch(()=>renderAgenda());
  } else {
    err.style.display='block';
    document.getElementById('login-pass').value='';
  }
}

// ── PACIENTES ──────────────────────────────────────────────────────────────
function showPacientes(){
  document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===1));
  screenStack.push('screen-pacientes');showScreen('screen-pacientes',false);renderPacientes();
}
function renderPacientes(q=''){
  // TODOS los pacientes visibles para TODOS — lista única sin filtros
  let list=patientsDB;
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));

  const c=document.getElementById('content-pacientes');
  let html=`<div class="search-wrap">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" placeholder="Buscar paciente..." oninput="renderPacientes(this.value)" value="${q}">
    ${q?`<button onclick="renderPacientes('')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--gray-400);flex-shrink:0">×</button>`:''}
  </div>`;

  if(!list.length){
    html+=`<div class="empty-state"><div class="emoji">🔍</div><p>${q?`Sin resultados para "${q}"`:'Sin pacientes aún.'}</p></div>`;
  } else {
    html+=`<div style="font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">
      Pacientes de la clínica (${list.length})
    </div>`;
    list.forEach(p=>{
      const hasConsent=p.consentimiento&&p.consentimiento.firmado;
      const inc=p.soap&&p.soap.some(s=>!s.completa);
      const esMio=p.terapeuta===currentUser.name;
      const badge=inc?`<span class="badge badge-alert" style="font-size:10px">⚠</span>`:!hasConsent?`<span class="badge badge-pending" style="font-size:10px">📋</span>`:'';
      html+=`<div class="patient-card" onclick="openExpediente('${p.id}')">
        <div class="patient-avatar">${initials(p.name)}</div>
        <div class="patient-info">
          <div class="patient-name">${p.name}</div>
          <div class="patient-meta">
            <span>👤 ${p.age}a</span>
            <span style="${!esMio?'color:var(--gold);font-weight:700':''}">🩺 ${p.terapeuta}</span>
            ${p.terapeutaSeguimiento?`<span style="color:var(--green);font-size:10px">→ ${p.terapeutaSeguimiento}</span>`:''}
            <span>${p.sesiones} ses.</span>
          </div>
          <div class="patient-meta" style="margin-top:3px;font-size:11px;color:#5A6478;">${p.dx.split(',')[0]}</div>
        </div>
        ${badge}
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color:#9BA3B5;flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    });
  }

  html+=`<button class="btn-primary" style="margin-top:12px" onclick="showNuevoPaciente()">+ Nuevo paciente</button>`;
  c.innerHTML=html;
}

// ── EXPEDIENTE ─────────────────────────────────────────────────────────────
function openExpediente(pid){
  currentPatient=patientsDB.find(p=>p.id===pid);
  if(!currentPatient) return;
  document.getElementById('exp-topbar-name').textContent=currentPatient.name.split(' ').slice(0,2).join(' ');
  document.getElementById('exp-topbar-meta').textContent=`${currentPatient.age} años · ${currentPatient.terapeuta}${currentPatient.terapeutaSeguimiento?' → '+currentPatient.terapeutaSeguimiento:''}`;
  document.getElementById('exp-avatar').textContent=initials(currentPatient.name);
  screenStack.push('screen-expediente');showScreen('screen-expediente',false);
  renderExpediente('historia');
}

function toggleMod(m){
  tempMods=tempMods.includes(m)?tempMods.filter(x=>x!==m):[...tempMods,m];

  if(g) g.innerHTML=MODALIDADES.map(mod=>{

function guardarSOAP(){
  const v=(id)=>document.getElementById(id)?.value.trim()||'';
  const missing=[];
  if(!v('f-sdolor')) missing.push('Dolor (S)');
  if(!v('f-scambios')) missing.push('Cambios (S)');
  if(!v('f-orom')) missing.push('ROM (O)');
  if(!v('f-ofuerza')) missing.push('Fuerza (O)');
  if(!v('f-ohallazgos')) missing.push('Hallazgos (O)');
  if(!v('f-aevolucion')) missing.push('Evolución (A)');
  if(!v('f-arespuesta')) missing.push('Respuesta (A)');
  if(!v('f-aanalisis')) missing.push('Análisis (A)');
  if(!v('f-ptratamiento')) missing.push('Tratamiento (P)');
  if(!v('f-pindicaciones')) missing.push('Indicaciones (P)');
  if(!v('f-pcontra')) missing.push('Contraindicaciones (P)');
  if(tempMods.length===0) missing.push('Modalidades');
  if(missing.length){showToast(`Faltan: ${missing.slice(0,2).join(', ')}${missing.length>2?'...':''}`, 'error');return}

  const p=currentPatient;
  const sesNum=p.sesiones+1;

    id:'s'+Date.now(), num:sesNum, fecha:todayFmt(), terapeuta:ter,
    semana, totalSesiones:parseInt(p.planTto.sesiones)||10,
    s:{dolor:v('f-sdolor'), cambios:v('f-scambios'), actFisica:v('f-sactfisica')},
    o:{rom:v('f-orom'), fuerza:v('f-ofuerza'), hallazgos:v('f-ohallazgos')},
    a:{evolucion:v('f-aevolucion'), respuesta:v('f-arespuesta'), analisis:v('f-aanalisis')},
    p:{tratamiento:v('f-ptratamiento'), indicaciones:v('f-pindicaciones'), contraindicaciones:v('f-pcontra')},
    modalidades:[...tempMods], evaI:tempEvaI, evaF:tempEvaF,
    media:[...tempEvolMedia], completa:true

  p.soap.push(nuevaSOAP);

function initCanvas(canvasId, wrapId, lineColor='#1B3A6B'){
  const cv=document.getElementById(canvasId);
  if(!cv) return null;
  const wrap=document.getElementById(wrapId);
  cv.width=wrap?wrap.offsetWidth-4:320;
  const ctx=cv.getContext('2d');
  ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false;
  const getPos=(e)=>{const r=cv.getBoundingClientRect();
    if(e.touches) return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
    return{x:e.clientX-r.left,y:e.clientY-r.top};};
  cv.addEventListener('mousedown',e=>{drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)});
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)},{passive:false});
  cv.addEventListener('mousemove',e=>{if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke()});
  cv.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke()},{passive:false});
  cv.addEventListener('mouseup',()=>drawing=false);cv.addEventListener('touchend',()=>drawing=false);
  return{canvas:cv,ctx,isEmpty:()=>{const d=ctx.getImageData(0,0,cv.width,cv.height).data;for(let i=3;i<d.length;i+=4)if(d[i]>0)return false;return true;},clear:()=>ctx.clearRect(0,0,cv.width,cv.height)};
}

// ── CÁMARA CONSENTIMIENTO ─────────────────────────────────────────────────
let consentStream = null;

async function startConsentCamera(){
  try {
    consentStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} },
      audio:false
    });
    const video = document.getElementById('consent-video');
    if(video){ video.srcObject = consentStream; }
    document.getElementById('consent-cam-start').style.display = 'none';
    document.getElementById('consent-cam-live').style.display = 'block';
    document.getElementById('consent-cap-btn-wrap').style.display = 'block';
    showToast('🎥 Cámara activa — el paciente puede firmar ahora');
  } catch(err){
    showToast('Permiso de cámara denegado — solo se guardará la firma','error');
    document.getElementById('consent-cam-start').innerHTML = `
      <div style="background:var(--amber-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--amber);font-weight:600">
        ⚠️ Cámara no disponible — el consentimiento se guardará solo con firma digital
      </div>`;
  }
}

function captureConsentPhoto(){
  const video = document.getElementById('consent-video');
  const canvas = document.getElementById('consent-cap-canvas');
  if(!video || !canvas) return;
  canvas.width = video.videoWidth || 320;
  canvas.height = video.videoHeight || 240;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  fotoIdData = canvas.toDataURL('image/jpeg', 0.85);
  // stop stream
  if(consentStream){ consentStream.getTracks().forEach(t=>t.stop()); consentStream=null; }
  // show captured
  const img = document.getElementById('consent-foto-img');
  if(img) img.src = fotoIdData;
  document.getElementById('consent-cam-live').style.display = 'none';
  document.getElementById('consent-cap-btn-wrap').style.display = 'none';
  document.getElementById('consent-cam-done').style.display = 'block';
  showToast('✅ Foto capturada junto con la firma','success');
}

function retakeConsentPhoto(){
  fotoIdData = null;
  if(consentStream){ consentStream.getTracks().forEach(t=>t.stop()); consentStream=null; }
  document.getElementById('consent-cam-done').style.display = 'none';
  document.getElementById('consent-cam-live').style.display = 'none';
  document.getElementById('consent-cap-btn-wrap').style.display = 'none';
  document.getElementById('consent-cam-start').style.display = 'block';
  document.getElementById('consent-cam-start').innerHTML = `
    <button onclick="startConsentCamera()" style="width:100%;background:var(--navy);color:white;border:none;border-radius:var(--radius);padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px">
      <span style="font-size:20px">🤳</span> Activar cámara frontal
    </button>
    <div style="font-size:11px;color:var(--gray-400);text-align:center;margin-top:6px">Safari pedirá permiso — toca Permitir</div>`;
}

function togglePuncion(){
  const sec=document.getElementById('puncion-section');
  const tog=document.getElementById('puncion-toggle');
  if(!sec) return;
  const open=sec.style.display==='none';
  sec.style.display=open?'block':'none';
  if(tog) tog.textContent=open?'Ocultar ↑':'¿Aplica? toca aquí';
  if(open) setTimeout(()=>{sigPS=initCanvas('sig-canvas-ps','canvas-wrap-ps')},80);
}

function isSigEmpty(){
  return !sigMain||sigMain.isEmpty();
}

function guardarConsentimiento(){
  const nombre=document.getElementById('con-nombre')?.value.trim();
  if(!nombre){showToast('Ingresa el nombre del paciente','error');return}
  if(isSigEmpty()){showToast('Se requiere la firma digital','error');return}
  const esMenor=currentPatient.age<18;
  if(esMenor){
    const tutor=document.getElementById('con-tutor')?.value.trim();
    if(!tutor){showToast('Se requiere el nombre del tutor','error');return}
    if(!sigTutor||sigTutor.isEmpty()){
      sigTutor=initCanvas('sig-canvas-tutor','canvas-wrap-tutor');
      if(!sigTutor||sigTutor.isEmpty()){showToast('Se requiere la firma del tutor','error');return}
    }
  }
  // Stop camera if still running
  if(consentStream){ consentStream.getTracks().forEach(t=>t.stop()); consentStream=null; }
  const ahora=new Date();
  const firma=sigMain.canvas.toDataURL('image/png');
  const firmaPS=sigPS&&!sigPS.isEmpty()?sigPS.canvas.toDataURL('image/png'):null;
  const firmaTutor=sigTutor&&!sigTutor.isEmpty()?sigTutor.canvas.toDataURL('image/png'):null;
  currentPatient.consentimiento={
    firmado:true,
    firma, firmaPS, firmaTutor,
    fotoIdentidad: fotoIdData||null,
    fecha:ahora.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}),
    hora:ahora.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}),
    nombre,
    tutor:document.getElementById('con-tutor')?.value.trim()||null,
    parentesco:document.getElementById('con-parentesco')?.value.trim()||null,
    puncionSeca:document.getElementById('con-puncion')?.checked||false,
    tel:document.getElementById('con-tel')?.value.trim()||null,
    emergencia:document.getElementById('con-emergencia')?.value.trim()||null,
  };
  fotoIdData=null;
  saveDB('pts',patientsDB);
  const saved=document.getElementById('sig-saved');
  if(saved) saved.style.display='block';
  showToast('✅ Consentimiento guardado','success');
  setTimeout(()=>{goBack();renderExpediente('consent')},1400);
}

      <div class="form-field"><div class="form-label">Agentes físicos</div><input class="form-input" id="n-agentes" type="text" placeholder="Ej: US, MEP, TENS, ESWT"></div>
      <div class="form-field"><div class="form-label">Contraindicaciones</div><input class="form-input" id="n-plancontra" type="text" placeholder="Ej: Sin impacto, sin AINES"></div>
    </div>
  </div>
  <button class="btn-primary" onclick="guardarNuevoPaciente()">✅ Crear expediente</button>
  <button class="btn-secondary" onclick="goBack()">Cancelar</button>
  <div style="height:20px"></div>`;

  // Navegación con Enter entre campos
  setTimeout(()=>{
    camposOrden.forEach((id,i)=>{
      const el=document.getElementById(id);
      if(!el||el.tagName==='TEXTAREA') return; // textareas: Enter hace salto de línea normal
      el.addEventListener('keydown',function(e){
        if(e.key==='Enter'){
          e.preventDefault();
          // Buscar el siguiente campo disponible
          for(let j=i+1;j<camposOrden.length;j++){
            const next=document.getElementById(camposOrden[j]);
            if(next){next.focus();break;}
          }
        }
      });
    });
  },100);
}

function guardarNuevoPaciente(){
  const v=(id,def='')=>document.getElementById(id)?.value.trim()||def;
  const nombre=v('n-nombre'), edad=v('n-edad'), alergias=v('n-alergias');
  const dxmedico=v('n-dxmedico'), padecimiento=v('n-padecimiento');
  const frecuencia=v('n-frecuencia'), sesiones=v('n-sesiones');
  if(!nombre||!edad||!alergias||!dxmedico||!padecimiento||!frecuencia||!sesiones){
    showToast('Faltan campos obligatorios','error');return;
  }
  const evaVal=parseInt(document.getElementById('n-eva-sl')?.value||5);
  const nuevo={
    id:'p'+Date.now(), name:nombre, age:parseInt(edad),
    terapeuta:v('n-terapeuta')||currentUser.name,
    terapeutaSeguimiento:v('n-terapeuta-seguimiento')||'',
    date:todayISO,
    medicoReferente:v('n-medico'),
    dx:dxmedico,
    contraindicaciones:v('n-contra','Ninguna'),
    alergias,
    antecedentes:{patologicos:v('n-patologicos','Ninguno'),deportivos:v('n-deportivos','Ninguno'),
      deporteFrecuencia:v('n-deporte-freq','No aplica'),cirugias:v('n-cirugias','Ninguna'),medicamentos:v('n-medicamentos','Ninguno')},
    motivo:{dxMedico:dxmedico, padecimiento, mecanismo:v('n-mecanismo','No especificado'),
      evolucion:v('n-evolucion','No especificado'),estudios:v('n-estudios','Pendiente'),hallazgos:v('n-hallazgos','Pendiente')},
    valoracion:{eva:evaVal,inflamacion:v('n-inflamacion','No evaluada'),marcha:v('n-marcha','No evaluada'),
      rom:v('n-rom','No evaluado'),fuerza:v('n-fuerza','No evaluada'),flexibilidad:v('n-flex','No evaluada'),
      pruebasEspeciales:v('n-pruebas','No realizadas'),palpacion:v('n-palpacion','No evaluada'),banderasRojas:v('n-banderas','Ninguna')},
    dxFuncional:{dxClinico:v('n-dxclinico',dxmedico),dxFuncional:v('n-dxfuncional','Pendiente'),
      limitaciones:v('n-limitaciones','Pendiente'),objetivosCP:v('n-objcp','Pendiente'),
      objetivosLP:v('n-objlp','Pendiente'),pronostico:v('n-pronostico','Pendiente')},
    planTto:{frecuencia,sesiones,ejercicioTerapeutico:v('n-ejercicio','Pendiente'),
      terapiaManual:v('n-tmanual','Pendiente'),agentesFisicos:v('n-agentes','Pendiente'),
      contraindicaciones:v('n-plancontra','Ninguna')},
    consentimiento:{firmado:false,firma:null,fecha:null,nombre:null},
    sesiones:0, fotos:[], docs:[], ejercicios:[], soap:[],
    creadoPor: currentUser.name, fechaCreacion: todayFmt()
  };
  patientsDB.push(nuevo);
  saveDB('pts',patientsDB);
  showToast('✅ Historia clínica guardada correctamente','success');
  // Ir directo al expediente del paciente nuevo
  setTimeout(()=>{
    screenStack = screenStack.filter(s => s !== 'screen-nuevo');
    currentPatient = nuevo;
    document.getElementById('exp-topbar-name').textContent = nuevo.name.split(' ').slice(0,2).join(' ');
    document.getElementById('exp-topbar-meta').textContent = `${nuevo.age} años · ${nuevo.terapeuta}`;
    document.getElementById('exp-avatar').textContent = initials(nuevo.name);
    screenStack.push('screen-expediente');
    showScreen('screen-expediente',false);
    renderExpediente('historia');
  },400);
}

function guardarEdicionHistoria(seccion, tabRetorno){
  const p = currentPatient;
  const v = id => document.getElementById(id)?.value.trim()||'';

  if(seccion==='generales'){
    p.medicoReferente = v('ed-medico');
    p.dx = v('ed-dx') || p.dx;
    p.contraindicaciones = v('ed-contra');
    p.alergias = v('ed-alergias') || p.alergias;
  }
  if(seccion==='antecedentes'){
    p.antecedentes.patologicos = v('ed-patologicos');
    p.antecedentes.deportivos = v('ed-deportivos');
    p.antecedentes.deporteFrecuencia = v('ed-deporte-freq');
    p.antecedentes.cirugias = v('ed-cirugias');
    p.antecedentes.medicamentos = v('ed-medicamentos');
  }
  if(seccion==='motivo'){
    p.motivo.dxMedico = v('ed-dxmedico') || p.motivo.dxMedico;
    p.motivo.padecimiento = v('ed-padecimiento');
    p.motivo.mecanismo = v('ed-mecanismo');
    p.motivo.evolucion = v('ed-evolucion');
    p.motivo.estudios = v('ed-estudios');
    p.motivo.hallazgos = v('ed-hallazgos');
  }
  if(seccion==='valoracion'){
    p.valoracion.eva = parseInt(document.getElementById('ed-eva')?.value||p.valoracion.eva);
    p.valoracion.inflamacion = v('ed-inflamacion');
    p.valoracion.marcha = v('ed-marcha');
    p.valoracion.rom = v('ed-rom');
    p.valoracion.fuerza = v('ed-fuerza');
    p.valoracion.flexibilidad = v('ed-flex');
    p.valoracion.pruebasEspeciales = v('ed-pruebas');
    p.valoracion.palpacion = v('ed-palpacion');
    p.valoracion.banderasRojas = v('ed-banderas');
  }
  if(seccion==='dxfuncional'){
    p.dxFuncional.dxClinico = v('ed-dxclinico');
    p.dxFuncional.dxFuncional = v('ed-dxfuncional');
    p.dxFuncional.limitaciones = v('ed-limitaciones');
    p.dxFuncional.objetivosCP = v('ed-objcp');
    p.dxFuncional.objetivosLP = v('ed-objlp');
    p.dxFuncional.pronostico = v('ed-pronostico');
  }
  if(seccion==='plan'){
    p.planTto.frecuencia = v('ed-frecuencia');
    p.planTto.sesiones = v('ed-sesiones');
    p.planTto.ejercicioTerapeutico = v('ed-ejercicio');
    p.planTto.terapiaManual = v('ed-tmanual');
    p.planTto.agentesFisicos = v('ed-agentes');
    p.planTto.contraindicaciones = v('ed-plancontra');
  }

  saveDB('pts', patientsDB);
  showToast('✅ Cambios guardados','success');
  renderExpediente(tabRetorno);
}

let currentEjercicio = null; // ejercicio being edited

function generateToken(){
  return Math.random().toString(36).substr(2,16) + Date.now().toString(36);
}

function showEjercicios(){
  if(!currentPatient) return;
  if(!currentPatient.ejercicios) currentPatient.ejercicios = [];
  if(!currentPatient.ejerciciosToken) {
    currentPatient.ejerciciosToken = generateToken();
    currentPatient.ejerciciosLinkActivo = true;
    saveDB('pts', patientsDB);
  }
  document.getElementById('ej-topbar-name').textContent = currentPatient.name.split(' ').slice(0,2).join(' ');
  document.getElementById('ej-topbar-meta').textContent = `${currentPatient.ejercicios.length} ejercicio${currentPatient.ejercicios.length!==1?'s':''}`;
  screenStack.push('screen-ejercicios');
  showScreen('screen-ejercicios', false);
  renderEjercicios();
}

function renderEjercicios(){
  const p = currentPatient;
  const ejs = p.ejercicios || [];
  const c = document.getElementById('content-ejercicios');
  const token = p.ejerciciosToken;
  const activo = p.ejerciciosLinkActivo !== false;
  const base = window.location.href.includes('srcdoc') || window.location.protocol === 'about:' 
    ? 'https://tuclínica.github.io/clinica' 
    : window.location.href.split('?')[0].split('#')[0];
  const linkUrl = `${base}?ejercicios=${token}`;

  let html = '';

  // Link del paciente
  html += `<div class="section-card" style="margin-bottom:14px">
    <div class="section-title">🔗 Link para el paciente
      <span style="margin-left:auto;font-size:11px;font-weight:600;color:${activo?'var(--green)':'var(--red)'}">
        ${activo?'● Activo':'● Desactivado'}
      </span>
    </div>
    <div style="padding:12px 14px">
      <div class="link-url">${linkUrl}</div>
      <div class="link-btns">
        <button class="btn-copy" onclick="copyLink('${linkUrl}')">📋 Copiar</button>
        <button class="btn-wa" onclick="sendWhatsApp('${linkUrl}','${p.name}')">WhatsApp</button>
        <button class="btn-toggle-link" onclick="toggleLink()">${activo?'🔒 Desactivar':'🔓 Activar'}</button>
      </div>
    </div>
  </div>`;

  // Instrucción
  if(!ejs.length){
    html += `<div class="empty-state"><div class="emoji">🏃</div>
      <p>Sin ejercicios asignados aún.<br>Toca <b>+ Agregar</b> para crear el primer ejercicio.</p></div>`;
  } else {
    // Update topbar count
    document.getElementById('ej-topbar-meta').textContent = `${ejs.length} ejercicio${ejs.length!==1?'s':''}`;

    ejs.forEach((ej,i) => {
      const isVideo = ej.media && ej.media.type && ej.media.type.startsWith('video');
      const isImg = ej.media && ej.media.type && ej.media.type.startsWith('image');
      html += `<div class="ejercicio-card">
        <div class="ejercicio-header">
          <div>
            <div class="ejercicio-nombre">${i+1}. ${ej.nombre}</div>
            <div class="ejercicio-meta">${ej.fecha} · ${ej.terapeuta}</div>

function copyLink(url){
  if(navigator.clipboard) {
    navigator.clipboard.writeText(url).then(()=>showToast('✅ Link copiado','success'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ Link copiado','success');
  }
}

  const msg = encodeURIComponent(`Hola, te comparto el programa de ejercicios de Clínica Sinergia:\n\n${url}\n\nRecuerda realizarlos según las indicaciones de tu terapeuta.`);

function renderEjMediaPreview(media){
  if(!media) return '';
  const isVideo = media.type && media.type.startsWith('video');
  const isImg = media.type && media.type.startsWith('image');
  return `<div style="position:relative;border-radius:var(--radius-sm);overflow:hidden;background:#111;max-height:200px;display:flex;align-items:center;justify-content:center">
    ${isVideo
      ? `<video src="${media.data}" controls style="width:100%;max-height:200px;object-fit:cover;border-radius:8px" preload="metadata"></video>`
      : isImg
        ? `<img src="${media.data}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px">`
        : `<div style="padding:20px;color:white;text-align:center">📎 ${media.label||media.name}</div>`}
    <button onclick="clearEjMedia()" style="position:absolute;top:6px;right:6px;background:rgba(192,57,43,.9);border:none;border-radius:50%;width:26px;height:26px;color:white;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
  </div>`;
}

async function handleEjMedia(ev, tipo){
  const file = ev.target.files[0]; if(!file) return;
  // Size check — warn if >50MB
  if(file.size > 50*1024*1024){
    showToast('Video muy pesado — intenta grabar uno más corto','error'); 
    ev.target.value=''; return;
  }
  showToast('Cargando archivo...'); 
  const data = await readFile(file);
  tempEjMedia = { name:file.name, data, type:file.type, label:file.name.replace(/\.[^.]+$/,'') };
  ev.target.value = '';
  const preview = document.getElementById('ej-media-preview');
  if(preview) preview.innerHTML = renderEjMediaPreview(tempEjMedia);
  showToast('✅ Archivo listo','success');
}

function clearEjMedia(){
  tempEjMedia = null;
  const preview = document.getElementById('ej-media-preview');
  if(preview) preview.innerHTML = '';
}

function guardarEjercicio(){
  const v = id => document.getElementById(id)?.value.trim()||'';
  const nombre = v('ej-nombre');
  const objetivo = v('ej-objetivo');
  const indicaciones = v('ej-indicaciones');
  if(!nombre){showToast('Falta el nombre del ejercicio','error');return}
  if(!indicaciones){showToast('Faltan las indicaciones','error');return}

  if(!currentPatient.ejercicios) currentPatient.ejercicios = [];

  const ejData = {
    id: 'ej'+Date.now(),
    nombre, objetivo,
    dosis: v('ej-dosis'),
    series: '', repeticiones: '', tiempo: '', frecuencia: '', duracion: '',
    indicaciones,
    precauciones: v('ej-precauciones'),
    observaciones: v('ej-observaciones'),
    fecha: v('ej-fecha'),
    terapeuta: v('ej-terapeuta'),
    media: tempEjMedia || null,
  };

  if(currentEjercicio && currentEjercicio._editIdx !== undefined){
    currentPatient.ejercicios[currentEjercicio._editIdx] = ejData;
    showToast('✅ Ejercicio actualizado','success');
  } else {
    currentPatient.ejercicios.push(ejData);
    showToast('✅ Ejercicio guardado','success');
  }

  tempEjMedia = null;
  currentEjercicio = null;
  saveDB('pts', patientsDB);
  goBack();
  setTimeout(()=>renderEjercicios(), 300);
}

function eliminarEjercicio(idx){
  showToast('Toca de nuevo para confirmar eliminación');
  setTimeout(()=>{
    currentPatient.ejercicios.splice(idx,1);
    saveDB('pts', patientsDB);
    renderEjercicios();
    showToast('Ejercicio eliminado');
  }, 1500);
}

  const p = patientsDB.find(x => x.ejerciciosToken === token);

// ── QA: Probar conexión ────────────────────────────────────────────
async function qaProbarConexion(){
  showToast('Probando conexión...','');
  try{
    const r=await fetch(`${APPS_SCRIPT_URL}?action=getPacientes&token=${TOKEN}`);
    const d=await r.json();
    if(d.error&&d.code===401){
      QA_RESULTADOS.conexion=false;
      QA_RESULTADOS.error='Token rechazado por el servidor';
    } else {
      QA_RESULTADOS.conexion=true;
      QA_RESULTADOS.error='';
    }
  }catch(e){
    QA_RESULTADOS.conexion=false;
    QA_RESULTADOS.error=e.message||'Sin respuesta del servidor';
  }
  renderQA();
  showToast(QA_RESULTADOS.conexion?'✅ Conexión OK':'❌ Sin conexión', QA_RESULTADOS.conexion?'success':'error');
}


// ── QA: Crear 10 pacientes ficticios ──────────────────────────────
async function qaCrearPacientes(){
  showToast('Limpiando TEST QA anteriores en Sheets...','');

  // 1. Borrar TEST QA anteriores del Sheets primero
  try{
    const urlDel=`${APPS_SCRIPT_URL}?action=deleteTestQA&token=${TOKEN}`;
    await fetch(urlDel,{method:'GET'});
    await new Promise(r=>setTimeout(r,1500));
  }catch(e){ console.warn('No se pudieron borrar TEST QA anteriores:',e.message); }

  showToast('Creando 10 pacientes TEST QA...','');
  const fecha = todayFmt();
  const testPacientes=[
    {creator:'CARLOS',terapeuta:'DAF'},
    {creator:'DAF',terapeuta:'ZARA'},
    {creator:'ZARA',terapeuta:'SARA'},
    {creator:'SARA',terapeuta:'CAMI'},
    {creator:'CAMI',terapeuta:'CARLOS'},
    {creator:'CARLOS',terapeuta:'ZARA'},
    {creator:'DAF',terapeuta:'SARA'},
    {creator:'ZARA',terapeuta:'CAMI'},
    {creator:'SARA',terapeuta:'DAF'},
    {creator:'CAMI',terapeuta:'DAF'},
  ];
  const dxList=[
    'Tendinopatía rotuliana bilateral','Lumbalgia crónica por sobrecarga postural',
    'Cervicalgia tensional con irradiación C6','Esguince de tobillo grado II recurrente',
    'Síndrome de pinzamiento subacromial derecho','Hernia discal L4-L5 con radiculopatía',
    'Fibromialgia con puntos gatillo activos','Post-op ligamento cruzado anterior izquierdo',
    'Gonalgia medial por condromalacia rotuliana','Epicondilitis lateral codo derecho',
  ];
  patientsDB=patientsDB.filter(p=>!p.name.startsWith('TEST QA'));
  const nuevos=testPacientes.map((t,i)=>{
    const num=String(i+1).padStart(2,'0');
    return {
      id:`qa${Date.now()}${i}`,name:`TEST QA ${num}`,age:25+i,
      terapeuta:t.terapeuta,terapeutaSeguimiento:'',date:todayISO,
      medicoReferente:`Dr. Test ${num}`,dx:dxList[i],
      contraindicaciones:'Ninguna (ficticio)',alergias:'Ninguna',
      creadoPor:t.creator,fechaCreacion:fecha,fechaActualizacion:fecha,ultimoUsuario:t.creator,
      antecedentes:{patologicos:'Ninguno',deportivos:'Variable',deporteFrecuencia:'3x semana',cirugias:'Ninguna',medicamentos:'Ninguno'},
      motivo:{dxMedico:dxList[i],padecimiento:`Paciente ficticio QA ${num}.`,mecanismo:'Ficticio',evolucion:'1 semana',estudios:'Ninguno',hallazgos:'Ficticio'},
      valoracion:{eva:i+1,inflamacion:'Leve',marcha:'Normal',rom:'Completo',fuerza:`${10-i}/10`,flexibilidad:'Normal',pruebasEspeciales:'No realizadas',palpacion:'Sin hallazgos',banderasRojas:'Ninguna'},
      dxFuncional:{dxClinico:dxList[i],dxFuncional:`Disfunción ficticia QA ${num}`,limitaciones:'Prueba',objetivosCP:'Prueba QA',objetivosLP:'Prueba QA',pronostico:'Favorable'},
      planTto:{frecuencia:'2x semana',sesiones:'6',ejercicioTerapeutico:'Prueba',terapiaManual:'Prueba',agentesFisicos:'Prueba',contraindicaciones:'Ninguna'},
      consentimiento:{firmado:i%2===0,firma:null,fecha:i%2===0?fecha:null,nombre:i%2===0?`TEST QA ${num}`:null},
      sesiones:i+1,fotos:[],docs:[],ejercicios:[],soap:[],ejerciciosToken:'',ejerciciosLinkActivo:false,
    };
  });
  patientsDB=[...patientsDB,...nuevos];
  // ESPERAR respuesta real de Google Sheets
  showToast('Guardando en Sheets — espera hasta 10 seg...','');
  const resultado = await saveDB('pts',patientsDB);
  if(resultado && resultado.ok){
    showToast(`✅ ${resultado.guardados} pacientes enviados — verificando en Sheets...`,'success');
    // Esperar 3 segundos y leer desde Sheets para confirmar
    await new Promise(r=>setTimeout(r,3000));
    await qaLeerSheets();
    // Verificar que encontró los 10 TEST QA
    if(QA_RESULTADOS.totalTestQA>=10){
      QA_RESULTADOS.guardado=true;
      QA_RESULTADOS.error='';
      showToast(`✅ Confirmado: ${QA_RESULTADOS.totalTestQA} TEST QA en Sheets`,'success');
    } else {
      QA_RESULTADOS.guardado=false;
      QA_RESULTADOS.error=`Se intentó guardar pero Sheets solo tiene ${QA_RESULTADOS.totalTestQA} TEST QA (esperados 10)`;
      showToast('❌ '+QA_RESULTADOS.error,'error');
    }
  } else {
    QA_RESULTADOS.guardado=false;
    QA_RESULTADOS.error=resultado?.error||'Sheets no confirmó el guardado';
    showToast('❌ '+QA_RESULTADOS.error,'error');
  }
  renderQA();
}


// ── QA: Leer desde Sheets ─────────────────────────────────────────
async function qaLeerSheets(){
  showToast('Leyendo desde Google Sheets...','');
  try{
    const r=await fetch(`${APPS_SCRIPT_URL}?action=getPacientes&token=${TOKEN}`);
    const d=await r.json();
    if(!Array.isArray(d)){
      QA_RESULTADOS.lectura=false;
      QA_RESULTADOS.error='El Sheets no devolvió un array válido';
      renderQA(); return;
    }
    QA_RESULTADOS.lectura=true;
    QA_RESULTADOS.totalLeidos=d.length;
    QA_RESULTADOS.totalTestQA=d.filter(p=>p.name&&p.name.startsWith('TEST QA')).length;

    // Actualizar patientsDB
    if(d.length>0){ patientsDB=d; saveLocal('pts',d); }

    // Verificar IDs únicos
    const ids=d.map(p=>p.id).filter(Boolean);
    const idsUnicos=new Set(ids).size;
    QA_RESULTADOS.ids=ids.length>0&&idsUnicos===ids.length;
    QA_RESULTADOS.duplicados=idsUnicos<ids.length;
    QA_RESULTADOS.error='';

    renderQA();
    showToast(`✅ Leídos ${d.length} pacientes (${QA_RESULTADOS.totalTestQA} TEST QA)`,'success');
  }catch(e){
    QA_RESULTADOS.lectura=false;
    QA_RESULTADOS.error='Error de conexión: '+( e.message||'Sin respuesta');
    renderQA();
    showToast('❌ Error al leer Sheets','error');
  }
}

// ── QA: Verificar pacientes globales ──────────────────────────────
function qaVerificarGlobales(){
  // Simulamos login de DAF y verificamos que ve todos los pacientes
  const totalEnDB=patientsDB.length;
  // renderPacientes no filtra — todos deben verse
  // Verificamos que la función no use filtro por usuario
  // Verificación real: contar cuántos pacientes ve el sistema vs total en DB
  const totalDB = patientsDB.length;
  // Simular lo que renderPacientes devuelve — debe ser igual al total
  const listaVisible = patientsDB; // renderPacientes ahora no filtra
  const sinFiltro = listaVisible.length === totalDB;
  
  // Verificar también que no haya código de filtro restrictivo activo
  const renderStr = renderPacientes.toString();
  const tieneListaCompleta = renderStr.includes('Pacientes de la clínica');
  
  if(sinFiltro && tieneListaCompleta){
    QA_RESULTADOS.globales=true;
    QA_RESULTADOS.error='';
  } else {
    QA_RESULTADOS.globales=false;
    QA_RESULTADOS.error=`Se muestran ${listaVisible.length} de ${totalDB} pacientes`;
  }
  renderQA();
  showToast(QA_RESULTADOS.globales?'✅ Pacientes globales OK':'❌ Se detectó filtro por usuario',
    QA_RESULTADOS.globales?'success':'error');
}

// ── QA: Eliminar TEST QA ──────────────────────────────────────────
async function qaEliminarTestQA(){
  showToast('Eliminando TEST QA de memoria y Sheets...','');
  const antes=patientsDB.length;
  patientsDB=patientsDB.filter(p=>!p.name.startsWith('TEST QA'));
  const eliminados=antes-patientsDB.length;
  saveLocal('pts',patientsDB);

  // Borrar también del Sheets
  try{
    const urlDel=`${APPS_SCRIPT_URL}?action=deleteTestQA&token=${TOKEN}`;
    await fetch(urlDel,{method:'GET'});
    await new Promise(r=>setTimeout(r,2000));
  }catch(e){ console.warn('Error limpiando Sheets:',e.message); }

  QA_RESULTADOS.guardado=null;
  QA_RESULTADOS.lectura=null;
  QA_RESULTADOS.ids=null;
  QA_RESULTADOS.duplicados=null;
  QA_RESULTADOS.totalLeidos=null;
  QA_RESULTADOS.totalTestQA=null;
  renderQA();
  showToast(`🗑️ ${eliminados} TEST QA eliminados de memoria y Sheets`,'success');
}

// ── QA: Reporte completo ──────────────────────────────────────────
async function qaReporteCompleto(){
  showToast('Ejecutando reporte completo...','');
  await qaProbarConexion();
  await new Promise(r=>setTimeout(r,800));
  qaCrearPacientes();
  await new Promise(r=>setTimeout(r,2000));
  await qaLeerSheets();
  await new Promise(r=>setTimeout(r,800));
  qaVerificarGlobales();
  showToast('✅ Reporte QA completado','success');
}

// ── SUPERVISIÓN ────────────────────────────────────────────────────────────
function showSupervision(){
  if(currentUser.role!=='supervisor') return;
  screenStack.push('screen-supervision');showScreen('screen-supervision',false);renderSupervision();
}
function renderSupervision(){
  const ters=['CARLOS','DAF','ZARA','GORE','JESS','CAMI'];
  const c=document.getElementById('content-supervision');
  let html='';
  ters.forEach(ter=>{
    const pts=patientsDB.filter(p=>p.terapeuta===ter);
    const totalSOAP=pts.reduce((a,p)=>a+p.soap.length,0);
    const inc=pts.reduce((a,p)=>a+p.soap.filter(s=>!s.completa).length,0);
    const sinConsent=pts.filter(p=>!p.consentimiento?.firmado).length;
    const pct=totalSOAP>0?Math.round(((totalSOAP-inc)/totalSOAP)*100):100;
    const col=pct>=80?'var(--green)':'var(--red)';
    html+=`<div class="section-card" style="margin-bottom:12px">
      <div class="section-title">🩺 ${ter} <span style="margin-left:auto;font-size:13px;font-weight:700;color:${col}">${pct}%</span></div>
      <div class="sup-row"><div style="font-size:13px;color:var(--gray-600)">Pacientes activos</div><div style="font-weight:700">${pts.length}</div></div>
      <div class="sup-row"><div style="font-size:13px;color:var(--gray-600)">Notas SOAP</div><div style="font-weight:700">${totalSOAP}</div></div>
      <div class="sup-row"><div style="font-size:13px;color:var(--gray-600)">SOAP incompletos</div><div style="font-weight:700;color:${inc>0?'var(--red)':'var(--green)'}">${inc>0?`⚠ ${inc}`:'✅ 0'}</div></div>
      <div class="sup-row"><div style="font-size:13px;color:var(--gray-600)">Sin consentimiento</div><div style="font-weight:700;color:${sinConsent>0?'var(--amber)':'var(--green)'}">${sinConsent>0?`📋 ${sinConsent}`:'✅ 0'}</div></div>
      ${pts.filter(p=>p.soap.some(s=>!s.completa)).map(p=>`<div onclick="openExpediente('${p.id}')" style="padding:8px 14px;font-size:12px;color:var(--red);font-weight:600;cursor:pointer;background:var(--red-light)">⚠ ${p.name} →</div>`).join('')}
    </div>`;
  });
  c.innerHTML=html;
}
